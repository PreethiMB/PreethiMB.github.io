# ✏️ EDIT these details
title: Preethi MB
description: Geospatial specialist. Writing about maps, data, and the natural world.
url: "https://preethimb.github.io"
baseurl: ""

author:
  name: Preethi MB
  email: your@email.com       # ✏️ your email
  twitter: yourhandle         # ✏️ or remove this line

# Build settings
markdown: kramdown
permalink: /blog/:year/:month/:day/:title/
excerpt_separator: <!--more-->

# Plugins (all supported by GitHub Pages natively — no extra install needed)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Default front matter for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Preethi MB"
